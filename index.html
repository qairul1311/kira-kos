<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KiraKos" />
  <title>KiraKos</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --d: 'Instrument Serif', serif;
      --b: 'DM Sans', sans-serif;
      --m: 'JetBrains Mono', monospace;
      --s0: #0f1117; --s1: #161920; --s2: #1d2028; --s3: #242731;
      --br: #2c303d;
      --t1: #edf0f7; --t2: #9096aa; --t3: #565c70;
      --ac: #e8913a; --ac2: #d4782a; --acb: rgba(232,145,58,.1);
      --gn: #2dd4a0; --rd: #f47070; --am: #f5c144;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      /* THE FIX: body is the scroll container, no overflow:hidden anywhere above sheets */
      height: 100%;
      background: var(--s0);
      font-family: var(--b);
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    input, select, button { font-family: var(--b); }
    input[type=number]::-webkit-inner-spin-button { opacity: .3; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ── LAYOUT: simple flex column, NO overflow:hidden on wrappers ── */
    #wrap {
      display: flex;
      flex-direction: column;
      /* Use svh (small viewport height) - supported iOS 15.4+, excludes browser chrome */
      height: 100svh;
      height: 100vh; /* fallback */
      height: 100svh; /* override with svh if supported */
      background: var(--s0);
    }

    .topbar {
      flex-shrink: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--br);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 10px;
      /* NO overflow:hidden */
    }

    .scroll-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 20px;
      /* NO overflow:hidden — overflow:auto is fine, fixed elements escape this */
    }

    .tabbar {
      flex-shrink: 0;
      background: var(--s1);
      border-top: 1px solid var(--br);
      display: flex;
      padding-top: 8px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      /* NO overflow:hidden */
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; padding: 4px 2px;
    }
    .tab .ico { font-size: 22px; line-height: 1; transition: transform .15s; }
    .tab .lbl { font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
    .tab.on .ico { transform: scale(1.18); }
    .tab.on .lbl { color: var(--ac); }
    .tab:not(.on) .lbl { color: var(--t3); }

    /* ── SHEETS: position:fixed works because NO ancestor has overflow:hidden ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 900;
    }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--s1);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--br);
      max-height: 90svh;
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 18px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      z-index: 901;
      animation: slideup .28s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; background: var(--br); border-radius: 2px; margin: 12px auto 18px; }
    .sheet-title { font-family: var(--d); font-size: 20px; color: var(--t1); font-style: italic; margin-bottom: 5px; }
    .sheet-sub { font-size: 12px; color: var(--t3); margin-bottom: 18px; }

    .toast {
      position: fixed;
      top: max(70px, calc(env(safe-area-inset-top) + 60px));
      left: 16px; right: 16px;
      background: var(--gn); color: #071a0f;
      border-radius: 10px; padding: 11px 14px;
      font-size: 13px; font-weight: 700; text-align: center;
      z-index: 950;
      animation: fadein .2s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    /* ── PAGE ── */
    .page { animation: pagein .2s ease both; }
    @keyframes pagein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .ph {
      position: sticky; top: 0;
      background: var(--s0); z-index: 10;
      padding: 14px 0 10px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .ptitle { font-family: var(--d); font-size: 26px; color: var(--t1); font-style: italic; }

    /* ── FORMS ── */
    .fld { display: flex; flex-direction: column; gap: 5px; }
    .fld label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; }
    .fld input, .fld select {
      background: var(--s2); border: 1.5px solid var(--br); border-radius: 10px;
      padding: 13px; color: var(--t1); font-size: 15px; outline: none;
      width: 100%; transition: border-color .18s; -webkit-appearance: none;
    }
    .fld input:focus, .fld select:focus { border-color: var(--ac); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all .14s; min-height: 50px; padding: 0 20px; border: none;
    }
    .bp  { background: var(--ac);  color: #fff; }
    .bp:active { background: var(--ac2); }
    .bs  { background: var(--acb); color: var(--ac);  border: 1.5px solid var(--ac); }
    .bd  { background: rgba(244,112,112,.08); color: var(--rd); border: 1.5px solid rgba(244,112,112,.25); }
    .bg  { background: var(--s2);  color: var(--t2);  border: 1.5px solid var(--br); }
    .bam { background: rgba(245,193,68,.12); color: var(--am); border: 1.5px solid rgba(245,193,68,.35); }
    .sm  { min-height: 38px; padding: 0 14px; font-size: 12px; border-radius: 10px; }
    .fw  { width: 100%; }

    /* ── CARDS ── */
    .card { background: var(--s1); border: 1px solid var(--br); border-radius: 14px; padding: 16px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { background: var(--s2); border: 1px solid var(--br); border-radius: 12px; padding: 14px; }
    .slbl { font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; }
    .sval { font-family: var(--m); font-size: 24px; font-weight: 700; line-height: 1; }
    .ssub { font-size: 10px; color: var(--t3); margin-top: 3px; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 9px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; background: var(--acb); color: var(--ac); }
    .bam-badge { background: rgba(245,193,68,.1); color: var(--am); }
    .brd-badge { background: rgba(244,112,112,.1); color: var(--rd); }
    .pt { height: 5px; background: var(--s3); border-radius: 3px; overflow: hidden; margin-top: 5px; }
    .pf { height: 100%; border-radius: 3px; transition: width .5s; }
    .empty { text-align: center; padding: 50px 20px; color: var(--t3); }
    .empty-ico { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty-msg { font-size: 13px; line-height: 1.6; }
    .slb { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .ir { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .ir select, .ir input { background: var(--s2); border: 1.5px solid var(--br); border-radius: 9px; padding: 11px 9px; color: var(--t1); font-size: 13px; outline: none; }
    .rc { background: var(--s1); border: 1px solid var(--br); border-radius: 14px; overflow: hidden; }
    .rh { padding: 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .rb { padding: 0 14px 14px; border-top: 1px solid var(--br); }
    .cr { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .cr input { background: var(--s3); border: 1px solid var(--br); border-radius: 8px; padding: 11px 10px; color: var(--t1); font-size: 14px; outline: none; }
    .mc { background: var(--s2); border-radius: 11px; padding: 12px; margin-bottom: 8px; }

    /* ── SCANNER ── */
    .szn { border: 2px dashed var(--br); border-radius: 14px; padding: 32px 20px; text-align: center; cursor: pointer; background: var(--s2); position: relative; overflow: hidden; }
    .szn:active { border-color: var(--ac); background: var(--acb); }
    .szn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; font-size: 0; }
    .si { background: var(--s2); border: 1.5px solid var(--br); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .si.flag { border-color: rgba(245,193,68,.4); }
    .si.gone { opacity: .4; }
    .sf { display: flex; flex-direction: column; gap: 4px; }
    .sf label { font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .8px; }
    .sf input, .sf select { background: var(--s3); border: 1px solid var(--br); border-radius: 8px; padding: 9px 10px; color: var(--t1); font-size: 13px; outline: none; width: 100%; -webkit-appearance: none; }
    .spin { width: 28px; height: 28px; border: 3px solid var(--br); border-top-color: var(--ac); border-radius: 50%; animation: spinning .7s linear infinite; margin: 0 auto 14px; }
    @keyframes spinning { to { transform: rotate(360deg); } }
    .pbar-w { height: 6px; background: var(--s3); border-radius: 3px; overflow: hidden; margin: 8px 0 4px; }
    .pbar   { height: 100%; background: var(--ac); border-radius: 3px; transition: width .3s; }

    /* ── APP LOGO ── */
    .logo { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--ac), var(--ac2)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .appname { font-family: var(--d); font-size: 20px; color: var(--t1); font-style: italic; line-height: 1; }
    .appsub  { font-size: 9px; color: var(--t3); letter-spacing: .5px; margin-top: 2px; }
    .barright { margin-left: auto; font-size: 10px; color: var(--t3); text-align: right; line-height: 1.6; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const CURRENCIES = ["MYR","IDR","SGD","PHP","THB","USD"];
const BIZ_TYPES  = ["Stall","Cafe","Restaurant","Cloud Kitchen","Food Truck","Bakery","Catering"];
const UNITS      = ["kg","g","litre","ml","piece","pack","tray","dozen","bottle","can","bunch","cup","tbsp","tsp"];
const CATEGORIES = ["Main","Side","Drink","Dessert","Combo","Add-on","Snack"];
const BENCHMARK  = {"Stall":[25,35],"Cafe":[28,35],"Restaurant":[30,38],"Cloud Kitchen":[25,33],"Food Truck":[25,35],"Bakery":[25,35],"Catering":[30,40]};
const uid = () => Math.random().toString(36).slice(2,9);
const TABS = [
  {key:"guide",       label:"Guide",   icon:"📖"},
  {key:"profile",     label:"Profile", icon:"🏪"},
  {key:"ingredients", label:"Ingred.", icon:"🥚"},
  {key:"packaging",   label:"Pack.",   icon:"📦"},
  {key:"recipes",     label:"Recipes", icon:"🍳"},
  {key:"dashboard",   label:"Stats",   icon:"📊"},
];
const defaultProfile = {
  name:"", type:"Stall", currency:"MYR", targetCostPct:30,
  channels:[
    {id:uid(),name:"Walk-in",commission:0},
    {id:uid(),name:"GrabFood",commission:30},
    {id:uid(),name:"Foodpanda",commission:25},
  ]
};

// ── Storage ───────────────────────────────────────────────
const KEY = "kirakos_v1";
const loadData = () => { try { const d=localStorage.getItem(KEY); return d?JSON.parse(d):null; } catch(e){return null;} };
const saveData = d => { try { localStorage.setItem(KEY,JSON.stringify(d)); } catch(e){} };

// ── Unit conversion ───────────────────────────────────────
const convertUnit = (qty, from, to) => {
  if (!from||!to||from===to) return qty;
  const f=from.toLowerCase(), t=to.toLowerCase();
  if (f==="g"    &&t==="kg")    return qty/1000;
  if (f==="kg"   &&t==="g")     return qty*1000;
  if (f==="ml"   &&t==="litre") return qty/1000;
  if (f==="litre"&&t==="ml")    return qty*1000;
  if (f==="cup"  &&t==="ml")    return qty*240;
  if (f==="cup"  &&t==="litre") return qty*0.24;
  if (f==="ml"   &&t==="cup")   return qty/240;
  if (f==="litre"&&t==="cup")   return qty/0.24;
  if (f==="tbsp" &&t==="ml")    return qty*15;
  if (f==="tsp"  &&t==="ml")    return qty*5;
  if (f==="ml"   &&t==="tbsp")  return qty/15;
  if (f==="ml"   &&t==="tsp")   return qty/5;
  if (f==="tbsp" &&t==="tsp")   return qty*3;
  if (f==="tsp"  &&t==="tbsp")  return qty/3;
  if (f==="piece"&&t==="dozen") return qty/12;
  if (f==="dozen"&&t==="piece") return qty*12;
  return qty;
};
const ppu = ing => { const t=+(ing.totalPrice||ing.price||0), q=+(ing.purchaseQty||1); return q>0?t/q:t; };

// ── Calc ──────────────────────────────────────────────────
const calcRecipe = (r, ings, pkgs, target) => {
  let ic=0;
  r.items.forEach(it => {
    const ing=ings.find(x=>x.id===it.ingredientId);
    if (!ing) return;
    const useU = it.useUnit||ing.unit;
    ic += ppu(ing) * convertUnit(+it.qty||0, useU, ing.unit);
  });
  let pc=0;
  r.pkgs.forEach(p => { const k=pkgs.find(x=>x.id===p.packagingId); if(k) pc+=k.price*p.qty; });
  const raw=ic/(r.yield||1), wst=raw*((r.wastage||0)/100);
  const lab=r.labourMin>0?(r.labourRate/60)*r.labourMin/(r.yield||1):0;
  const tot=raw+wst+pc+lab;
  const cp=r.sellingPrice>0?(tot/r.sellingPrice)*100:0;
  const gp=r.sellingPrice-tot, mg=r.sellingPrice>0?(gp/r.sellingPrice)*100:0;
  const sp=target>0?tot/(target/100):0;
  return {ingCost:raw,pkgCost:pc,wastageAmt:wst,labourCost:lab,totalCost:tot,costPct:cp,grossProfit:gp,margin:mg,suggestedPrice:sp};
};

// ── Tiny UI ───────────────────────────────────────────────
const Pill = ({val,target}) => {
  const c=val<=target?"var(--gn)":val<=target*1.15?"var(--am)":"var(--rd)";
  return <span style={{color:c,fontFamily:"var(--m)",fontWeight:700,fontSize:13}}>{val.toFixed(1)}%</span>;
};
const Empty = ({msg}) => <div className="empty"><div className="empty-ico">📭</div><div className="empty-msg">{msg}</div></div>;
const F = ({label,children}) => <div className="fld">{label&&<label>{label}</label>}{children}</div>;

// Sheet renders with overlay + bottom sheet — position:fixed works because no ancestor has overflow:hidden
const Sheet = ({open,onClose,title,sub,children}) => {
  if (!open) return null;
  return ReactDOM.createPortal(
    <>
      <div className="overlay" onClick={onClose}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        {title&&<div className="sheet-title">{title}</div>}
        {sub&&<div className="sheet-sub">{sub}</div>}
        {children}
      </div>
    </>,
    document.body
  );
};

// ── Receipt Scanner (Tesseract OCR) ──────────────────────
const Scanner = ({open,onClose,onSave,currency,existing}) => {
  const [step,setStep]   = useState("upload");
  const [prev,setPrev]   = useState(null);
  const [prog,setProg]   = useState(0);
  const [pmsg,setPmsg]   = useState("");
  const [items,setItems] = useState([]);
  const [sup,setSup]     = useState("");
  const [err,setErr]     = useState(null);

  const reset = () => { setStep("upload");setPrev(null);setProg(0);setItems([]);setSup("");setErr(null); };
  const close = () => { reset();onClose(); };

  const handleFile = async e => {
    const file=e.target.files?.[0]; if(!file) return;
    setErr(null);
    const url=URL.createObjectURL(file);
    setPrev(url); setStep("scanning"); setProg(0); setPmsg("Loading OCR...");
    try {
      if (!window.Tesseract) {
        await new Promise((res,rej)=>{
          const s=document.createElement("script");
          s.src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js";
          s.onload=res; s.onerror=rej; document.head.appendChild(s);
        });
      }
      const result = await window.Tesseract.recognize(url,"eng",{
        logger: m => {
          if (m.status==="recognizing text"){setProg(Math.round(m.progress*100));setPmsg("Reading text...");}
          else if (m.status.includes("loading")){setPmsg("Loading...");setProg(15);}
          else if (m.status.includes("init")){setPmsg("Starting...");setProg(25);}
        }
      });
      setProg(95); setPmsg("Parsing...");
      const text=result.data.text;
      if (!text||text.trim().length<10) throw new Error("Can't read image. Try better lighting.");
      const parsed=parseLines(text.split("\n").map(l=>l.trim()).filter(l=>l.length>1));
      if (!parsed.length) throw new Error("No items found. Try a clearer photo or add manually.");
      setProg(100);
      setItems(parsed.map(i=>({...i,id:uid(),removed:false,exists:existing.some(e=>e.name.toLowerCase()===i.name.toLowerCase())})));
      setStep("review");
      URL.revokeObjectURL(url);
    } catch(e) {
      setErr(e.message||"Scan failed."); setStep("upload"); URL.revokeObjectURL(url);
    }
  };

  const parseLines = lines => {
    const skip=["total","subtotal","grand","tax","gst","sst","change","cash","card","receipt","invoice","thank","tel","fax","date","time","void","discount","rounding","service","charge","running","qty","price","amount","payment","paid","balance","item","unit","description","no.","reg"];
    const res=[]; const seen=new Set();
    for (const line of lines) {
      const lo=line.toLowerCase();
      if (skip.some(w=>lo.includes(w))) continue;
      if (line.length<3) continue;
      if (/^[\d\s\.\,\:\-\*\/\=\+]+$/.test(line)) continue;
      const pm=line.match(/(\d+[\.,]\d{2})/g);
      const price=pm?parseFloat(pm[pm.length-1].replace(",",".")):0;
      let name=line.replace(/[\d\.\,\:\*\/\=\(\)]+.*$/,"").trim().replace(/^[\-\*\.\s]+|[\-\*\.\s]+$/g,"").trim();
      name=name.split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(" ");
      if (name.length<2||/^\d+$/.test(name)) continue;
      const k=name.toLowerCase(); if(seen.has(k)) continue; seen.add(k);
      const nl=name.toLowerCase();
      let unit="piece";
      if (/flour|sugar|salt|rice|chicken|beef|pork|meat|butter|powder|cheese/.test(nl)) unit="kg";
      else if (/milk|oil|water|sauce|syrup|vinegar|coconut|cream/.test(nl)) unit="litre";
      else if (/egg/.test(nl)) unit="dozen";
      else if (/box|pack|bag|tin|can|bottle/.test(nl)) unit="pack";
      res.push({name,price:price||0,unit,qty:1,confidence:price>0?"high":"low"});
    }
    return res;
  };

  const upd  = (id,k,v) => setItems(p=>p.map(i=>i.id===id?{...i,[k]:v}:i));
  const tog  = id => setItems(p=>p.map(i=>i.id===id?{...i,removed:!i.removed}:i));
  const act  = items.filter(i=>!i.removed).length;
  const doSave = () => {
    onSave(items.filter(i=>!i.removed).map(i=>({id:uid(),name:i.name,price:+i.price,unit:i.unit,supplier:sup||""})),sup);
    close();
  };

  if (!open) return null;
  return ReactDOM.createPortal(
    <>
      <div className="overlay" onClick={close}/>
      <div className="sheet">
        <div className="sheet-handle"/>
        {step==="upload"&&(<>
          <div className="sheet-title">📷 Scan Receipt</div>
          <div className="sheet-sub">Free OCR — reads printed receipts</div>
          <div className="szn" style={{marginBottom:14}}>
            <input type="file" accept="image/*" capture="environment" onChange={handleFile}/>
            <div style={{fontSize:40,marginBottom:10}}>🧾</div>
            <div style={{fontWeight:700,fontSize:15,color:"var(--t1)",marginBottom:4}}>Tap to take photo</div>
            <div style={{fontSize:12,color:"var(--t3)"}}>or choose from library</div>
          </div>
          {err&&<div style={{background:"rgba(244,112,112,.1)",border:"1px solid rgba(244,112,112,.3)",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,color:"var(--rd)"}}>⚠️ {err}</div>}
          <div className="card" style={{marginBottom:14,padding:"12px 14px"}}>
            <div className="slb">Tips</div>

// ── Batch & Menu Item Calcs ──────────────────────────────
const calcBatch = (batch, ings) => {
  let cost = 0;
  (batch.items||[]).forEach(it => {
    const ing = ings.find(x => x.id === it.ingredientId);
    if (!ing) return;
    const useU = it.useUnit || ing.unit;
    cost += ppu(ing) * convertUnit(+it.qty||0, useU, ing.unit);
  });
  const withWastage = cost * (1 + (batch.wastage||0)/100);
  const portions = +(batch.portions||1);
  return { totalCost: cost, withWastage, costPerPortion: withWastage / portions, portions };
};

const calcMenuItem = (item, batches, ings, pkgs, target) => {
  // 1. Base batch cost (per portion)
  let batchCost = 0;
  if (item.batchId) {
    const b = batches.find(x => x.id === item.batchId);
    if (b) batchCost = calcBatch(b, ings).costPerPortion;
  }
  // 2. Toppings / extra ingredients
  let toppingCost = 0;
  (item.items||[]).forEach(it => {
    const ing = ings.find(x => x.id === it.ingredientId);
    if (!ing) return;
    const useU = it.useUnit || ing.unit;
    toppingCost += ppu(ing) * convertUnit(+it.qty||0, useU, ing.unit);
  });
  // 3. Wastage buffer on toppings only
  const wastageAmt = toppingCost * ((item.wastage||0)/100);
  // 4. Packaging
  let pkgCost = 0;
  (item.pkgs||[]).forEach(p => {
    const pk = pkgs.find(x => x.id === p.packagingId);
    if (pk) pkgCost += pk.price * p.qty;
  });
  // 5. Labour
  const labourCost = item.labourMin > 0 ? (item.labourRate/60) * item.labourMin : 0;

  const totalCost = batchCost + toppingCost + wastageAmt + pkgCost + labourCost;
  const sp = +item.sellingPrice || 0;
  const cp = sp > 0 ? (totalCost / sp) * 100 : 0;
  const gp = sp - totalCost;
  const mg = sp > 0 ? (gp / sp) * 100 : 0;
  const sug = target > 0 ? totalCost / (target/100) : 0;
  return { batchCost, toppingCost, wastageAmt, pkgCost, labourCost, totalCost, costPct:cp, grossProfit:gp, margin:mg, suggestedPrice:sug };
};

  const addItem = () => { const f=ingredients[0]; setForm(x=>({...x,items:[...x.items,{ingredientId:f?.id||"",qty:"",useUnit:f?.unit||"g"}]})); };
  const upItem  = (i,k,v) => setForm(x=>({...x,items:x.items.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  const rmItem  = i => setForm(x=>({...x,items:x.items.filter((_,idx)=>idx!==i)}));

  const doSave = () => {
    if (!form.name || !form.portions) return;
    const data = {...form, portions:+form.portions||1, wastage:+form.wastage||0, items:form.items.map(it=>({...it,qty:+it.qty}))};
    if (editId) { setBatches(p=>p.map(b=>b.id===editId?{...b,...data}:b)); }
    else        { setBatches(p=>[...p,{id:uid(),...data}]); }
    setSheet(false);
  };

  return (
    <div>
      {ingredients.length===0 && <div className="card" style={{borderColor:"var(--am)",marginBottom:12}}><p style={{color:"var(--am)",fontSize:13,margin:0}}>⚠️ Add ingredients first before creating batches.</p></div>}
      {batches.length===0 ? (
        <div>
          <Empty msg="No batches yet. A batch is your base recipe — e.g. Original Batter that makes 20 pancakes."/>
          <button className="btn bp fw" style={{marginTop:8}} onClick={()=>open(null)} disabled={!ingredients.length}>+ Create First Batch</button>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {batches.map(b => {
            const bc = calcBatch(b, ingredients);
            const isO = expanded === b.id;
            return (
              <div key={b.id} className="rc">
                <div className="rh" onClick={()=>setExpanded(isO?null:b.id)}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"var(--t1)"}}>{b.name}</div>
                    <div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>Makes {b.portions} portions · wastage {b.wastage}%</div>
                  </div>
                  <div style={{display:"flex",gap:14,alignItems:"center"}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:2}}>PER PORTION</div>
                      <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:14,color:"var(--ac)"}}>{currency} {bc.costPerPortion.toFixed(3)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:2}}>BATCH COST</div>
                      <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:"var(--t1)"}}>{currency} {bc.withWastage.toFixed(2)}</div>
                    </div>
                    <span style={{color:"var(--t3)",fontSize:16,transform:isO?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
                  </div>
                </div>
                {isO && (
                  <div className="rb">
                    <div style={{paddingTop:12,paddingBottom:12}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                        <div style={{background:"var(--s2)",borderRadius:9,padding:"10px 12px"}}>
                          <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:3}}>RAW INGREDIENT COST</div>
                          <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:"var(--t1)"}}>{currency} {bc.totalCost.toFixed(2)}</div>
                        </div>
                        <div style={{background:"var(--s2)",borderRadius:9,padding:"10px 12px"}}>
                          <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:3}}>WITH {b.wastage}% WASTAGE</div>
                          <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:"var(--t1)"}}>{currency} {bc.withWastage.toFixed(2)}</div>
                        </div>
                        <div style={{background:"var(--s2)",borderRadius:9,padding:"10px 12px"}}>
                          <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:3}}>PORTIONS MADE</div>
                          <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:"var(--t1)"}}>{b.portions}</div>
                        </div>
                        <div style={{background:"var(--acb)",border:"1px solid var(--ac)",borderRadius:9,padding:"10px 12px"}}>
                          <div style={{fontSize:9,color:"var(--ac)",fontWeight:700,marginBottom:3}}>COST PER PORTION</div>
                          <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:"var(--ac)"}}>{currency} {bc.costPerPortion.toFixed(4)}</div>
                        </div>
                      </div>
                      <div className="slb">Ingredients</div>
                      {b.items.map((it,i) => {
                        const ing = ingredients.find(x=>x.id===it.ingredientId);
                        const useU = it.useUnit||ing?.unit||"g";
                        const qBase = ing ? convertUnit(+it.qty||0,useU,ing.unit) : 0;
                        const cost = ing ? ppu(ing)*qBase : 0;
                        return (
                          <div key={i} style={{display:"flex",justifyContent:"space-between",paddingBottom:6,marginBottom:6,borderBottom:i<b.items.length-1?"1px solid var(--br)":"none"}}>
                            <div>
                              <div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{ing?.name||"Unknown"}</div>
                              <div style={{fontSize:11,color:"var(--t3)"}}>{it.qty} {useU}</div>
                            </div>
                            <div style={{fontFamily:"var(--m)",fontSize:12,color:"var(--t2)",fontWeight:700,alignSelf:"center"}}>{currency} {cost.toFixed(4)}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="btn bs sm" style={{flex:1}} onClick={()=>open(b)}>Edit Batch</button>
                      <button className="btn bd sm" onClick={()=>setBatches(p=>p.filter(x=>x.id!==b.id))}>Delete</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {batches.length > 0 && ingredients.length > 0 && (
        <button className="btn bs fw" style={{marginTop:14}} onClick={()=>open(null)}>+ Add Another Batch</button>
      )}

      <Sheet open={sheet} onClose={()=>setSheet(false)} title={editId?"Edit Batch":"New Batch"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <F label="Batch Name"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Original Batter"/></F>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Portions Made">
              <input type="number" value={form.portions} onChange={e=>setForm(f=>({...f,portions:e.target.value}))} placeholder="e.g. 20" min={1}/>
            </F>
            <F label="Wastage Buffer %">
              <input type="number" value={form.wastage} onChange={e=>setForm(f=>({...f,wastage:e.target.value}))} placeholder="5" min={0} max={50}/>
            </F>
          </div>
          <div style={{background:"var(--s2)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"var(--t3)",lineHeight:1.6}}>
            💡 <strong style={{color:"var(--t2)"}}>Portions Made</strong> = how many pancakes this batch of batter makes
          </div>

          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div className="slb" style={{marginBottom:0}}>Ingredients</div>
              <button className="btn bs sm" onClick={addItem} disabled={!ingredients.length}>+ Add</button>
            </div>
            {form.items.length === 0 && <div style={{fontSize:12,color:"var(--t3)",textAlign:"center",padding:"12px 0"}}>No ingredients added yet</div>}
            {form.items.map((it,i) => (
              <IngRow key={i} it={it} idx={i} ingredients={ingredients} currency={currency} onUpdate={upItem} onRemove={rmItem}/>
            ))}
          </div>

          {form.items.length > 0 && form.portions > 0 && (
            <div style={{background:"var(--acb)",border:"1px solid var(--ac)",borderRadius:10,padding:"12px 14px"}}>
              {(() => {
                const totalCost = form.items.reduce((sum,it) => {
                  const ing = ingredients.find(x=>x.id===it.ingredientId);
                  if (!ing) return sum;
                  return sum + ppu(ing) * convertUnit(+it.qty||0, it.useUnit||ing.unit, ing.unit);
                }, 0);
                const withW = totalCost * (1 + (+form.wastage||0)/100);
                const cpp = withW / (+form.portions||1);
                return (
                  <div>
                    <div style={{fontSize:11,color:"var(--ac)",fontWeight:700,marginBottom:4}}>LIVE PREVIEW</div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                      <span style={{color:"var(--t2)"}}>Batch cost (with wastage)</span>
                      <span style={{fontFamily:"var(--m)",fontWeight:700,color:"var(--t1)"}}>{currency} {withW.toFixed(2)}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginTop:6}}>
                      <span style={{color:"var(--t2)",fontWeight:700}}>Cost per portion</span>
                      <span style={{fontFamily:"var(--m)",fontWeight:800,color:"var(--ac)",fontSize:15}}>{currency} {cpp.toFixed(4)}</span>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          <div style={{display:"flex",gap:10,paddingBottom:4}}>
            <button className="btn bp fw" onClick={doSave}>{editId?"Update Batch":"Save Batch"}</button>
            <button className="btn bg"    onClick={()=>setSheet(false)}>Cancel</button>
          </div>
        </div>
      </Sheet>
    </div>
  );
};

// ── Menu Items Sub-Tab ────────────────────────────────────
const MenuItemsTab = ({menuItems, setMenuItems, batches, ingredients, packaging, profile}) => {
  const [sheet,    setSheet]    = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [expanded, setExpanded] = useState(null);
  const [showLab,  setShowLab]  = useState(false);
  const blank = {name:"",category:"Main",sellingPrice:"",batchId:"",wastage:"5",items:[],pkgs:[],labourMin:0,labourRate:0};
  const [form, setForm] = useState(blank);
  const cur = profile.currency;

  const open = m => {
    setEditId(m?.id||null);
    setForm(m ? {...m,sellingPrice:String(m.sellingPrice),wastage:String(m.wastage||5),items:m.items.map(it=>({...it})),pkgs:m.pkgs.map(p=>({...p}))} : blank);
    setShowLab(false);
    setSheet(true);
  };
  const addItem = () => { const f=ingredients[0]; setForm(x=>({...x,items:[...x.items,{ingredientId:f?.id||"",qty:"",useUnit:f?.unit||"g"}]})); };
  const upItem  = (i,k,v) => setForm(x=>({...x,items:x.items.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  const rmItem  = i => setForm(x=>({...x,items:x.items.filter((_,idx)=>idx!==i)}));
  const addPkg  = () => setForm(x=>({...x,pkgs:[...x.pkgs,{packagingId:packaging[0]?.id||"",qty:1}]}));
  const upPkg   = (i,k,v) => setForm(x=>({...x,pkgs:x.pkgs.map((p,idx)=>idx===i?{...p,[k]:v}:p)}));
  const rmPkg   = i => setForm(x=>({...x,pkgs:x.pkgs.filter((_,idx)=>idx!==i)}));

  const doSave = () => {
    if (!form.name || !form.sellingPrice) return;
    const data = {...form, sellingPrice:+form.sellingPrice, wastage:+form.wastage||0, labourMin:+form.labourMin||0, labourRate:+form.labourRate||0, items:form.items.map(it=>({...it,qty:+it.qty}))};
    if (editId) { setMenuItems(p=>p.map(m=>m.id===editId?{...m,...data}:m)); }
    else        { setMenuItems(p=>[...p,{id:uid(),...data}]); }
    setSheet(false);
  };

  return (
    <div>
      {menuItems.length===0 ? (
        <div>
          <Empty msg="No menu items yet. Create your first — e.g. Nutella Pancake."/>
          <button className="btn bp fw" style={{marginTop:8}} onClick={()=>open(null)}>+ Create First Menu Item</button>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {menuItems.map(m => {
            const c = calcMenuItem(m, batches, ingredients, packaging, profile.targetCostPct);
            const isO = expanded === m.id;
            const linkedBatch = batches.find(b=>b.id===m.batchId);
            return (
              <div key={m.id} className="rc">
                <div className="rh" onClick={()=>setExpanded(isO?null:m.id)}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"var(--t1)"}}>{m.name}</div>
                    <div style={{display:"flex",gap:7,marginTop:4,alignItems:"center"}}>
                      <span className="badge">{m.category}</span>
                      {linkedBatch && <span style={{fontSize:10,color:"var(--t3)"}}>+ {linkedBatch.name}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:14,alignItems:"center"}}>
                    <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:2}}>FOOD COST</div><Pill val={c.costPct} target={profile.targetCostPct}/></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:2}}>PROFIT</div><div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:c.grossProfit>=0?"var(--gn)":"var(--rd)"}}>{cur} {c.grossProfit.toFixed(2)}</div></div>
                    <span style={{color:"var(--t3)",fontSize:16,transform:isO?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
                  </div>
                </div>
                {isO && (
                  <div className="rb">
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,paddingTop:12,paddingBottom:14}}>
                      {[
                        ["Batch Cost",    `${cur} ${c.batchCost.toFixed(3)}`],
                        ["Toppings Cost", `${cur} ${c.toppingCost.toFixed(3)}`],
                        [`Wastage ${m.wastage}%`, `${cur} ${c.wastageAmt.toFixed(3)}`],
                        ["Packaging",    `${cur} ${c.pkgCost.toFixed(3)}`],
                        ["Labour",       `${cur} ${c.labourCost.toFixed(3)}`],
                        ["Total COGS",   `${cur} ${c.totalCost.toFixed(2)}`],
                        ["Selling Price",`${cur} ${(+m.sellingPrice).toFixed(2)}`],
                        ["Suggested",    `${cur} ${c.suggestedPrice.toFixed(2)}`],
                      ].map(([l,v],i)=>(
                        <div key={i} style={{background:"var(--s2)",borderRadius:9,padding:"10px 12px"}}>
                          <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:3}}>{l.toUpperCase()}</div>
                          <div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:13,color:l==="Selling Price"?"var(--ac)":l==="Suggested"?"var(--am)":l==="Total COGS"?"var(--t1)":"var(--t2)"}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div className="slb">Platform Margins</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                      {profile.channels.map(ch=>{
                        const nr=m.sellingPrice*(1-ch.commission/100),np=nr-c.totalCost,nm=nr>0?(np/nr)*100:0;
                        return (
                          <div key={ch.id} style={{background:"var(--s2)",borderRadius:10,padding:"11px 13px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div><div style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>{ch.name}</div><div style={{fontSize:10,color:"var(--t3)"}}>{ch.commission}% commission</div></div>
                            <div style={{textAlign:"right"}}><div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:15,color:np>=0?"var(--gn)":"var(--rd)"}}>{cur} {np.toFixed(2)}</div><div style={{fontSize:10,color:"var(--t3)"}}>{nm.toFixed(1)}%</div></div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="btn bs sm" style={{flex:1}} onClick={()=>open(m)}>Edit</button>
                      <button className="btn bd sm" onClick={()=>setMenuItems(p=>p.filter(x=>x.id!==m.id))}>Delete</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {menuItems.length > 0 && (
        <button className="btn bs fw" style={{marginTop:14}} onClick={()=>open(null)}>+ Add Menu Item</button>
      )}

      <Sheet open={sheet} onClose={()=>setSheet(false)} title={editId?"Edit Menu Item":"New Menu Item"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Name + Category */}
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
            <F label="Item Name"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Nutella Pancake"/></F>
            <F label="Category"><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></F>
          </div>

          {/* Selling price */}
          <F label={`Selling Price (${cur})`}>
            <input type="number" value={form.sellingPrice} onChange={e=>setForm(f=>({...f,sellingPrice:e.target.value}))} placeholder="e.g. 6.00" min={0} step="0.1"/>
          </F>

          {/* Base Batch */}
          <div>
            <div className="slb">Base Batch (optional)</div>
            {batches.length === 0 ? (
              <div style={{fontSize:12,color:"var(--t3)",padding:"8px 0"}}>No batches yet — create a batch first (e.g. Original Batter)</div>
            ) : (
              <F label="Choose Base Batch">
                <select value={form.batchId} onChange={e=>setForm(f=>({...f,batchId:e.target.value}))}>
                  <option value="">— None —</option>
                  {batches.map(b=>{
                    const bc=calcBatch(b,ingredients);
                    return <option key={b.id} value={b.id}>{b.name} · {cur}{bc.costPerPortion.toFixed(3)}/portion</option>;
                  })}
                </select>
              </F>
            )}
            {form.batchId && (()=>{
              const b=batches.find(x=>x.id===form.batchId);
              if (!b) return null;
              const bc=calcBatch(b,ingredients);
              return <div style={{marginTop:6,fontSize:12,color:"var(--t3)"}}>1 portion of <strong style={{color:"var(--t2)"}}>{b.name}</strong> = <span style={{color:"var(--ac)",fontFamily:"var(--m)",fontWeight:700}}>{cur} {bc.costPerPortion.toFixed(4)}</span></div>;
            })()}
          </div>

          {/* Toppings */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div className="slb" style={{marginBottom:0}}>Toppings / Extra Ingredients</div>
              <button className="btn bs sm" onClick={addItem} disabled={!ingredients.length}>+ Add</button>
            </div>
            {form.items.length===0 && <div style={{fontSize:12,color:"var(--t3)",padding:"4px 0 8px"}}>None added yet</div>}
            {form.items.map((it,i)=>(
              <IngRow key={i} it={it} idx={i} ingredients={ingredients} currency={cur} onUpdate={upItem} onRemove={rmItem}/>
            ))}
          </div>

          {/* Packaging */}
          {packaging.length > 0 && (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div className="slb" style={{marginBottom:0}}>Packaging</div>
                <button className="btn bs sm" onClick={addPkg}>+ Add</button>
              </div>
              {form.pkgs.map((p,i)=>(
                <div key={i} className="ir">
                  <select value={p.packagingId} onChange={e=>upPkg(i,"packagingId",e.target.value)} style={{flex:2}}>{packaging.map(pk=><option key={pk.id} value={pk.id}>{pk.name} ({cur}{(+pk.price).toFixed(2)})</option>)}</select>
                  <input type="number" value={p.qty} onChange={e=>upPkg(i,"qty",+e.target.value)} placeholder="Qty" min={1} style={{flex:1}}/>
                  <button onClick={()=>rmPkg(i)} style={{background:"none",border:"none",color:"var(--rd)",cursor:"pointer",fontSize:18,padding:"4px 6px"}}>✕</button>
                </div>
              ))}
            </div>
          )}

          {/* Wastage */}
          <F label="Wastage Buffer % (on toppings)">
            <input type="number" value={form.wastage} onChange={e=>setForm(f=>({...f,wastage:e.target.value}))} placeholder="5" min={0} max={50}/>
          </F>

          {/* Labour — collapsible */}
          <div>
            <button onClick={()=>setShowLab(x=>!x)} style={{background:"none",border:"none",color:"var(--t3)",fontSize:12,cursor:"pointer",padding:0,display:"flex",alignItems:"center",gap:6}}>
              <span style={{transform:showLab?"rotate(90deg)":"none",transition:"transform .2s",display:"inline-block"}}>›</span>
              {showLab?"Hide":"Show"} prep time / labour cost (optional)
            </button>
            {showLab && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:10}}>
                <F label="Prep Time (min)"><input type="number" value={form.labourMin} onChange={e=>setForm(f=>({...f,labourMin:e.target.value}))} min={0}/></F>
                <F label={`Rate (${cur}/hr)`}><input type="number" value={form.labourRate} onChange={e=>setForm(f=>({...f,labourRate:e.target.value}))} min={0} step="0.5"/></F>
              </div>
            )}
          </div>

          {/* Live COGS preview */}
          {form.sellingPrice > 0 && (()=>{
            const preview = calcMenuItem({...form,sellingPrice:+form.sellingPrice,wastage:+form.wastage||0,labourMin:+form.labourMin||0,labourRate:+form.labourRate||0,items:form.items.map(it=>({...it,qty:+it.qty}))}, batches, ingredients, packaging, profile.targetCostPct);
            const good = preview.costPct <= profile.targetCostPct;
            return (
              <div style={{background:good?"rgba(45,212,160,.08)":"rgba(244,112,112,.08)",border:`1px solid ${good?"var(--gn)":"var(--rd)"}`,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:11,fontWeight:700,color:good?"var(--gn)":"var(--rd)",marginBottom:8}}>LIVE COGS PREVIEW</div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}>
                  <span style={{color:"var(--t2)"}}>Total COGS</span>
                  <span style={{fontFamily:"var(--m)",fontWeight:700,color:"var(--t1)"}}>{cur} {preview.totalCost.toFixed(2)}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}>
                  <span style={{color:"var(--t2)"}}>Food Cost %</span>
                  <Pill val={preview.costPct} target={profile.targetCostPct}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:14}}>
                  <span style={{color:"var(--t2)",fontWeight:700}}>Profit</span>
                  <span style={{fontFamily:"var(--m)",fontWeight:800,color:preview.grossProfit>=0?"var(--gn)":"var(--rd)",fontSize:15}}>{cur} {preview.grossProfit.toFixed(2)}</span>
                </div>
              </div>
            );
          })()}

          <div style={{display:"flex",gap:10,paddingBottom:4}}>
            <button className="btn bp fw" onClick={doSave}>{editId?"Update Item":"Save Menu Item"}</button>
            <button className="btn bg"    onClick={()=>setSheet(false)}>Cancel</button>
          </div>
        </div>
      </Sheet>
    </div>
  );
};

// ── Recipes Tab (wrapper with sub-tabs) ───────────────────
const RecipesTab = ({batches, setBatches, menuItems, setMenuItems, ingredients, packaging, profile}) => {
  const [sub, setSub] = useState("batches");
  return (
    <div className="page">
      <div className="ph">
        <div className="ptitle">Recipes</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn bp sm" onClick={()=>{}} style={{display:"none"}}></button>
        </div>
      </div>

      {/* Sub-tab toggle */}
      <div style={{display:"flex",background:"var(--s2)",borderRadius:12,padding:4,marginBottom:16,gap:4}}>
        {[["batches","🥣 Batches"],["items","🍽 Menu Items"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSub(k)} style={{flex:1,padding:"10px 0",borderRadius:9,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,transition:"all .15s",background:sub===k?"var(--s1)":"transparent",color:sub===k?"var(--ac)":"var(--t3)",boxShadow:sub===k?"0 1px 4px rgba(0,0,0,.3)":"none"}}>
            {l}
          </button>
        ))}
      </div>

      {sub==="batches" && (
        <BatchesTab batches={batches} setBatches={setBatches} ingredients={ingredients} currency={profile.currency}/>
      )}
      {sub==="items" && (
        <MenuItemsTab menuItems={menuItems} setMenuItems={setMenuItems} batches={batches} ingredients={ingredients} packaging={packaging} profile={profile}/>
      )}
    </div>
  );
};

// ── Dashboard ─────────────────────────────────────────────
const DashboardTab = ({menuItems,batches,ingredients,packaging,profile}) => {
  const cur=profile.currency;
  const all=useMemo(()=>menuItems.map(m=>({...m,...calcMenuItem(m,batches,ingredients,packaging,profile.targetCostPct)})),[menuItems,batches,ingredients,packaging,profile.targetCostPct]);
  if (!menuItems.length) return <Empty msg="Add menu items to see your dashboard analytics."/>;
  const avg=all.reduce((s,r)=>s+r.costPct,0)/all.length;
  const top=[...all].sort((a,b)=>b.margin-a.margin).slice(0,5);
  const bot=[...all].sort((a,b)=>a.margin-b.margin).slice(0,5);
  const healthy=all.filter(r=>r.costPct<=profile.targetCostPct).length;
  const best=top[0]?.margin||100;
  return (
    <div className="page">
      <div className="ph"><div className="ptitle">Dashboard</div></div>
      <div className="stats">
        <div className="stat"><div className="slbl">Recipes</div><div className="sval">{recipes.length}</div></div>
        <div className="stat"><div className="slbl">Avg Food Cost</div><div className="sval" style={{color:avg<=profile.targetCostPct?"var(--gn)":"var(--rd)"}}>{avg.toFixed(1)}%</div><div className="ssub">Target: {profile.targetCostPct}%</div></div>
        <div className="stat"><div className="slbl">Healthy Items</div><div className="sval" style={{color:"var(--gn)"}}>{healthy}/{recipes.length}</div><div className="ssub">Under {profile.targetCostPct}% FC</div></div>
        <div className="stat"><div className="slbl">Ingredients</div><div className="sval">{ingredients.length}</div><div className="ssub">in library</div></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontFamily:"var(--d)",fontSize:15,color:"var(--gn)",marginBottom:12,fontStyle:"italic"}}>🏆 Top Margins</div>
        {top.map((r,i)=>(<div key={r.id} style={{marginBottom:i<top.length-1?12:0}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{r.name}</span><span style={{fontFamily:"var(--m)",fontWeight:700,color:"var(--gn)",fontSize:12}}>{r.margin.toFixed(1)}%</span></div><div className="pt"><div className="pf" style={{width:`${Math.max(0,(r.margin/best)*100)}%`,background:"var(--gn)"}}/></div></div>))}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontFamily:"var(--d)",fontSize:15,color:"var(--rd)",marginBottom:12,fontStyle:"italic"}}>⚠️ Lowest Margins</div>
        {bot.map((r,i)=>(<div key={r.id} style={{marginBottom:i<bot.length-1?12:0}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{r.name}</span><span style={{fontFamily:"var(--m)",fontWeight:700,color:r.margin<0?"var(--rd)":"var(--am)",fontSize:12}}>{r.margin.toFixed(1)}%</span></div><div className="pt"><div className="pf" style={{width:`${Math.max(0,Math.min(100,(r.margin/best)*100))}%`,background:r.margin<0?"var(--rd)":"var(--am)"}}/></div></div>))}
      </div>
      <div className="card">
        <div style={{fontFamily:"var(--d)",fontSize:15,color:"var(--t1)",marginBottom:12,fontStyle:"italic"}}>📋 Full Menu</div>
        {[...all].sort((a,b)=>b.margin-a.margin).map(r=>(
          <div key={r.id} className="mc">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><div style={{fontWeight:700,fontSize:13,color:"var(--t1)"}}>{r.name}</div><span className="badge" style={{marginTop:3,display:"inline-block"}}>{r.category}</span></div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"var(--m)",fontWeight:700,fontSize:15,color:r.grossProfit>=0?"var(--gn)":"var(--rd)"}}>{cur} {r.grossProfit.toFixed(2)}</div><div style={{fontSize:10,color:"var(--t3)"}}>profit/serving</div></div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:profile.channels.length?8:0}}>
              <div><span style={{fontSize:9,color:"var(--t3)"}}>COST </span><span style={{fontFamily:"var(--m)",fontSize:12,color:"var(--t2)"}}>{cur}{r.totalCost.toFixed(2)}</span></div>
              <div><span style={{fontSize:9,color:"var(--t3)"}}>PRICE </span><span style={{fontFamily:"var(--m)",fontSize:12,color:"var(--t1)"}}>{cur}{(+r.sellingPrice).toFixed(2)}</span></div>
              <div><span style={{fontSize:9,color:"var(--t3)"}}>FC </span><Pill val={r.costPct} target={profile.targetCostPct}/></div>
            </div>
            {profile.channels.length>0&&(
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {profile.channels.map(ch=>{const net=r.sellingPrice*(1-ch.commission/100)-r.totalCost;return<div key={ch.id} style={{background:"var(--s3)",borderRadius:7,padding:"4px 10px",fontSize:11}}><span style={{color:"var(--t3)"}}>{ch.name}: </span><span style={{fontFamily:"var(--m)",fontWeight:700,color:net>=0?"var(--gn)":"var(--rd)"}}>{cur}{net.toFixed(2)}</span></div>;})}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────
function App() {
  const saved = loadData();
  const [tab,       setTab]     = useState("guide");
  const [prof,      setProf]    = useState(saved?.profile     || defaultProfile);
  const [ings,      setIngs]    = useState(saved?.ingredients || []);
  const [pkgs,      setPkgs]    = useState(saved?.packaging   || []);
  const [batches,   setBatches] = useState(saved?.batches     || []);
  const [menuItems, setMenuItems] = useState(saved?.menuItems || saved?.recipes || []);
  const [ping,      setPing]    = useState(false);

  useEffect(()=>{
    saveData({profile:prof,ingredients:ings,packaging:pkgs,batches,menuItems});
    setPing(true);
    const t=setTimeout(()=>setPing(false),1200);
    return ()=>clearTimeout(t);
  },[prof,ings,pkgs,batches,menuItems]);

  return (
    <div id="wrap">
      <div className="topbar">
        <div className="logo">🍳</div>
        <div>
          <div className="appname">KiraKos</div>
          <div className="appsub">Food Cost Calculator</div>
        </div>
        <div className="barright">
          {prof.name&&<div style={{color:"var(--t2)",fontWeight:600,fontSize:11}}>{prof.name}</div>}
          <div>{prof.type} · {prof.currency} · {prof.targetCostPct}%</div>
          <div style={{fontSize:9,color:ping?"var(--gn)":"var(--t3)",transition:"color .4s"}}>{ping?"✓ Saved":"Auto-save on"}</div>
        </div>
      </div>

      <div className="scroll-area">
        {tab==="guide"       && <GuideTab setTab={setTab}/>}
        {tab==="profile"     && <ProfileTab profile={prof} setProfile={setProf}/>}
        {tab==="ingredients" && <IngredientsTab ingredients={ings} setIngredients={setIngs} currency={prof.currency}/>}
        {tab==="packaging"   && <PackagingTab packaging={pkgs} setPackaging={setPkgs} currency={prof.currency}/>}
        {tab==="recipes"     && <RecipesTab batches={batches} setBatches={setBatches} menuItems={menuItems} setMenuItems={setMenuItems} ingredients={ings} packaging={pkgs} profile={prof}/>}
        {tab==="dashboard"   && <DashboardTab menuItems={menuItems} batches={batches} ingredients={ings} packaging={pkgs} profile={prof}/>}
      </div>

      <div className="tabbar">
        {TABS.map(t=>(
          <button key={t.key} className={`tab ${tab===t.key?"on":""}`} onClick={()=>setTab(t.key)}>
            <span className="ico">{t.icon}</span>
            <span className="lbl">{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
