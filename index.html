<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KiraKos" />
  <meta name="description" content="Food cost and margin calculator for F&B businesses" />
  <title>KiraKos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --display: 'Instrument Serif', serif;
      --body: 'DM Sans', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --s0: #0f1117; --s1: #161920; --s2: #1d2028; --s3: #242731;
      --border: #2c303d;
      --t1: #edf0f7; --t2: #9096aa; --t3: #565c70;
      --accent: #e8913a; --accent2: #d4782a; --accent-bg: rgba(232,145,58,.1);
      --green: #2dd4a0; --red: #f47070; --amber: #f5c144;
      --tab-h: 60px;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0;
      overscroll-behavior: none;
      background: var(--s0);
      font-family: var(--body);
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
    }

    /* iOS PWA full screen fix — JS sets --app-h on load and resize */
    #root {
      width: 100%;
      height: var(--app-h, 100vh);
      display: flex;
      flex-direction: column;
      background: var(--s0);
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    input, select, button { font-family: var(--body); }
    input[type=number]::-webkit-inner-spin-button { opacity: .3; }
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }

    /* ── App Bar ── */
    .kk-bar {
      flex-shrink: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      padding: calc(12px + var(--sat)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kk-logo {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .kk-appname { font-family: var(--display); font-size: 20px; color: var(--t1); font-style: italic; line-height: 1; }
    .kk-appsub  { font-size: 9px; color: var(--t3); letter-spacing: .5px; margin-top: 2px; }
    .kk-barright { margin-left: auto; font-size: 10px; color: var(--t3); text-align: right; line-height: 1.6; }

    /* ── Scroll Area ── */
    .kk-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 24px;
    }

    /* ── Tab Bar ── */
    .kk-tabbar {
      flex-shrink: 0;
      background: var(--s1);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 6px;
      padding-bottom: max(var(--sab), 8px);
    }
    .kk-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: none; border: none; cursor: pointer; padding: 5px 2px;
      min-height: var(--tab-h);
    }
    .kk-tab .ico { font-size: 20px; line-height: 1; transition: transform .15s; }
    .kk-tab .lbl { font-size: 9px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
    .kk-tab.active .ico { transform: scale(1.15); }
    .kk-tab.active .lbl { color: var(--accent); }
    .kk-tab:not(.active) .lbl { color: var(--t3); }

    /* ── Sheet Modal — fixed to viewport, not relative to container ── */
    .kk-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--app-h, 100vh);
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
    }
    .kk-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--s1);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      max-height: 88%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 18px max(20px, var(--sab));
      z-index: 1001;
      animation: sheetUp .28s cubic-bezier(.22,1,.36,1);
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .kk-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 18px; }
    .kk-stitle { font-family: var(--display); font-size: 20px; color: var(--t1); font-style: italic; margin-bottom: 4px; }
    .kk-ssub   { font-size: 12px; color: var(--t3); margin-bottom: 18px; }

    /* ── Page ── */
    .kk-page { animation: pageIn .2s ease both; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .kk-ph {
      position: sticky; top: 0;
      background: var(--s0); z-index: 10;
      padding: 14px 0 10px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .kk-ptitle { font-family: var(--display); font-size: 26px; color: var(--t1); font-style: italic; }

    /* ── Form ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; }
    .field input, .field select {
      background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 13px 13px; color: var(--t1); font-size: 15px; outline: none;
      width: 100%; transition: border-color .18s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all .14s; min-height: 48px; padding: 0 20px; border: none;
    }
    .btn-p { background: var(--accent); color: #fff; }
    .btn-p:active { background: var(--accent2); transform: scale(.98); }
    .btn-s { background: var(--accent-bg); color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-d { background: rgba(244,112,112,.08); color: var(--red); border: 1.5px solid rgba(244,112,112,.25); }
    .btn-g { background: var(--s2); color: var(--t2); border: 1.5px solid var(--border); }
    .btn-amber { background: rgba(245,193,68,.12); color: var(--amber); border: 1.5px solid rgba(245,193,68,.35); }
    .btn-sm { min-height: 38px; padding: 0 14px; font-size: 12px; border-radius: 10px; }
    .btn-full { width: 100%; }

    /* ── Cards ── */
    .card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { background: var(--s2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .slabel { font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; }
    .sval { font-family: var(--mono); font-size: 24px; font-weight: 700; line-height: 1; }
    .ssub { font-size: 10px; color: var(--t3); margin-top: 3px; }

    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 9px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; background: var(--accent-bg); color: var(--accent); }
    .badge-amber { background: rgba(245,193,68,.1); color: var(--amber); }
    .badge-red { background: rgba(244,112,112,.1); color: var(--red); }

    .prog-track { height: 5px; background: var(--s3); border-radius: 3px; overflow: hidden; margin-top: 5px; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width .5s cubic-bezier(.22,1,.36,1); }

    .empty { text-align: center; padding: 50px 20px; color: var(--t3); }
    .empty-ico { font-size: 40px; margin-bottom: 12px; opacity: .4; }
    .empty-msg { font-size: 13px; line-height: 1.6; }
    .sec-lbl { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

    .ing-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .ing-row select, .ing-row input {
      background: var(--s2); border: 1.5px solid var(--border); border-radius: 9px;
      padding: 11px 9px; color: var(--t1); font-size: 13px; outline: none;
    }
    .r-card { background: var(--s1); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .r-head { padding: 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .r-body { padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .ch-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .ch-row input { background: var(--s3); border: 1px solid var(--border); border-radius: 8px; padding: 11px 10px; color: var(--t1); font-size: 14px; outline: none; }
    .menu-card { background: var(--s2); border-radius: 11px; padding: 12px; margin-bottom: 8px; }

    /* ── Scanner ── */
    .scan-zone {
      border: 2px dashed var(--border); border-radius: 14px;
      padding: 32px 20px; text-align: center; cursor: pointer;
      background: var(--s2); position: relative; overflow: hidden;
      transition: border-color .2s, background .2s;
    }
    .scan-zone:active { border-color: var(--accent); background: var(--accent-bg); }
    .scan-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; font-size: 0; }
    .scan-item { background: var(--s2); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .scan-item.flagged { border-color: rgba(245,193,68,.4); }
    .scan-item.removed { opacity: .4; }
    .sfield { display: flex; flex-direction: column; gap: 4px; }
    .sfield label { font-size: 9px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .8px; }
    .sfield input, .sfield select {
      background: var(--s3); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 10px; color: var(--t1); font-size: 13px; outline: none; width: 100%; -webkit-appearance: none;
    }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; top: 80px; left: 16px; right: 16px; background: var(--green); color: #0a1a12; border-radius: 10px; padding: 11px 14px; font-size: 13px; font-weight: 700; text-align: center; z-index: 200; animation: pageIn .2s ease; }
    .prog-bar-wrap { height: 6px; background: var(--s3); border-radius: 3px; overflow: hidden; margin: 8px 0 4px; }
    .prog-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
  // iOS PWA height fix — sets --app-h to actual visible height
  // This prevents the blank space caused by Safari address bar / status bar
  function setAppHeight() {
    const h = window.innerHeight;
    document.documentElement.style.setProperty('--app-h', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  // Run again after fonts/content load
  window.addEventListener('load', setAppHeight);
</script>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ── Constants ─────────────────────────────────────────────
const CURRENCIES = ["MYR","IDR","SGD","PHP","THB","USD"];
const BIZ_TYPES  = ["Stall","Cafe","Restaurant","Cloud Kitchen","Food Truck","Bakery","Catering"];
const UNITS      = ["kg","g","litre","ml","piece","pack","tray","dozen","bottle","can","bunch","cup","tbsp","tsp"];
const CATEGORIES = ["Main","Side","Drink","Dessert","Combo","Add-on","Snack"];
const BENCHMARK  = {"Stall":[25,35],"Cafe":[28,35],"Restaurant":[30,38],"Cloud Kitchen":[25,33],"Food Truck":[25,35],"Bakery":[25,35],"Catering":[30,40]};
const uid = () => Math.random().toString(36).slice(2,9);

const TABS = [
  {key:"guide",       label:"Guide",   icon:"📖"},
  {key:"profile",     label:"Profile", icon:"🏪"},
  {key:"ingredients", label:"Ingred.", icon:"🥚"},
  {key:"packaging",   label:"Pack.",   icon:"📦"},
  {key:"recipes",     label:"Recipes", icon:"🍳"},
  {key:"dashboard",   label:"Stats",   icon:"📊"},
];

const defaultProfile = {
  name:"", type:"Stall", currency:"MYR", targetCostPct:30,
  channels:[
    {id:uid(), name:"Walk-in",   commission:0},
    {id:uid(), name:"GrabFood",  commission:30},
    {id:uid(), name:"Foodpanda", commission:25},
  ]
};

// ── Storage ───────────────────────────────────────────────
const KEY = "kirakos_v1";
const load = () => { try { const d = localStorage.getItem(KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; } };
const save = (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {} };

// ── Calc ──────────────────────────────────────────────────
// ── Unit conversion ──────────────────────────────────────
// Convert qty in `fromUnit` to ingredient's base `toUnit`
const convertUnit = (qty, fromUnit, toUnit) => {
  if (fromUnit === toUnit) return qty;
  const from = fromUnit?.toLowerCase();
  const to   = toUnit?.toLowerCase();
  // Weight
  if (from === "g"    && to === "kg")    return qty / 1000;
  if (from === "kg"   && to === "g")     return qty * 1000;
  // Volume
  if (from === "ml"   && to === "litre") return qty / 1000;
  if (from === "litre"&& to === "ml")    return qty * 1000;
  if (from === "cup"  && to === "ml")    return qty * 240;
  if (from === "cup"  && to === "litre") return qty * 0.24;
  if (from === "ml"   && to === "cup")   return qty / 240;
  if (from === "litre"&& to === "cup")   return qty / 0.24;
  if (from === "tbsp" && to === "ml")    return qty * 15;
  if (from === "tbsp" && to === "litre") return qty * 0.015;
  if (from === "tsp"  && to === "ml")    return qty * 5;
  if (from === "tsp"  && to === "litre") return qty * 0.005;
  if (from === "ml"   && to === "tbsp")  return qty / 15;
  if (from === "ml"   && to === "tsp")   return qty / 5;
  if (from === "tbsp" && to === "tsp")   return qty * 3;
  if (from === "tsp"  && to === "tbsp")  return qty / 3;
  // Count
  if (from === "piece"&& to === "dozen") return qty / 12;
  if (from === "dozen"&& to === "piece") return qty * 12;
  // No known conversion — treat as 1:1
  return qty;
};

// Get price per base unit from ingredient
// ingredient stores: purchaseQty (how many units bought), totalPrice (what was paid)
// pricePerUnit = totalPrice / purchaseQty
const getPricePerUnit = (ing) => {
  const total = +(ing.totalPrice || ing.price || 0);
  const pQty  = +(ing.purchaseQty || 1);
  return pQty > 0 ? total / pQty : total;
};

const calcRecipe = (recipe, ings, pkgs, target) => {
  let ic = 0;
  recipe.items.forEach(it => {
    const ing = ings.find(x => x.id===it.ingredientId);
    if (!ing) return;
    const ppu      = getPricePerUnit(ing);           // price per base unit
    const useUnit  = it.useUnit || ing.unit;          // unit chosen in recipe
    const qtyInBase = convertUnit(+it.qty, useUnit, ing.unit); // convert to base
    ic += ppu * qtyInBase;
  });
  let pc = 0; recipe.pkgs.forEach(p  => { const k = pkgs.find(x => x.id===p.packagingId);  if(k) pc += k.price*p.qty; });
  const raw = ic / (recipe.yield||1);
  const wst = raw * ((recipe.wastage||0)/100);
  const lab = recipe.labourMin > 0 ? (recipe.labourRate/60)*recipe.labourMin/(recipe.yield||1) : 0;
  const tot = raw + wst + pc + lab;
  const cp  = recipe.sellingPrice > 0 ? (tot/recipe.sellingPrice)*100 : 0;
  const gp  = recipe.sellingPrice - tot;
  const mg  = recipe.sellingPrice > 0 ? (gp/recipe.sellingPrice)*100 : 0;
  const sp  = target > 0 ? tot/(target/100) : 0;
  return { ingCost:raw, pkgCost:pc, wastageAmt:wst, labourCost:lab, totalCost:tot, costPct:cp, grossProfit:gp, margin:mg, suggestedPrice:sp };
};

// ── Tiny UI ───────────────────────────────────────────────
const Pill = ({val,target}) => {
  const c = val<=target ? "var(--green)" : val<=target*1.15 ? "var(--amber)" : "var(--red)";
  return <span style={{color:c,fontFamily:"var(--mono)",fontWeight:700,fontSize:13}}>{val.toFixed(1)}%</span>;
};
const Empty = ({msg}) => <div className="empty"><div className="empty-ico">📭</div><div className="empty-msg">{msg}</div></div>;
const F = ({label,children}) => <div className="field">{label&&<label>{label}</label>}{children}</div>;
const Sheet = ({open,onClose,title,sub,children}) => {
  if(!open) return null;
  return (
    <>
      <div className="kk-overlay" onClick={onClose}/>
      <div className="kk-sheet">
        <div className="kk-handle"/>
        {title && <div className="kk-stitle">{title}</div>}
        {sub   && <div className="kk-ssub">{sub}</div>}
        {children}
      </div>
    </>
  );
};

// ── Tesseract Receipt Scanner ─────────────────────────────
const ReceiptScanner = ({open, onClose, onSave, currency, existing}) => {
  const [step, setStep]       = useState("upload"); // upload | scanning | review
  const [preview, setPreview] = useState(null);
  const [progress, setProgress] = useState(0);
  const [progMsg, setProgMsg]   = useState("");
  const [scanItems, setScanItems] = useState([]);
  const [supplier, setSupplier]   = useState("");
  const [error, setError]         = useState(null);

  const reset = () => { setStep("upload"); setPreview(null); setProgress(0); setScanItems([]); setSupplier(""); setError(null); };
  const handleClose = () => { reset(); onClose(); };

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setError(null);
    const url = URL.createObjectURL(file);
    setPreview(url);
    setStep("scanning");
    setProgress(0);
    setProgMsg("Loading OCR engine...");

    try {
      // Dynamically load Tesseract if not already loaded
      if (!window.Tesseract) {
        await new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = "https://unpkg.com/tesseract.js@5/dist/tesseract.min.js";
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }

      const result = await window.Tesseract.recognize(url, "eng", {
        logger: m => {
          if (m.status === "recognizing text") {
            setProgress(Math.round(m.progress * 100));
            setProgMsg("Reading text...");
          } else if (m.status === "loading tesseract core") {
            setProgMsg("Loading OCR engine...");
            setProgress(10);
          } else if (m.status === "initializing api") {
            setProgMsg("Initializing...");
            setProgress(20);
          } else if (m.status === "loading language traineddata") {
            setProgMsg("Loading language data...");
            setProgress(30);
          }
        }
      });

      setProgMsg("Parsing receipt...");
      setProgress(95);

      const text = result.data.text;
      if (!text || text.trim().length < 10) throw new Error("Could not read text from image. Try a clearer photo.");

      const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 1);
      const items = parseReceiptLines(lines);

      if (!items.length) throw new Error("No ingredients found. Try a clearer photo or add manually.");

      setProgress(100);
      setScanItems(items.map(i => ({
        ...i, id:uid(), removed:false,
        exists: existing.some(e => e.name.toLowerCase() === i.name.toLowerCase())
      })));
      setStep("review");
      URL.revokeObjectURL(url);

    } catch(err) {
      setError(err.message || "Scan failed. Try a clearer photo.");
      setStep("upload");
      URL.revokeObjectURL(url);
    }
  };

  // Parse OCR text lines into ingredient candidates
  const parseReceiptLines = (lines) => {
    const skipWords = ["total","subtotal","grand","tax","gst","sst","change","cash","card","receipt","invoice","thank","welcome","tel","fax","reg","no.","date","time","cashier","void","discount","rounding","service charge","receipt no","bill","payment","paid","balance","running","item","qty","price","unit","amount","description"];
    const items = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const lower = line.toLowerCase();

      // Skip lines that are clearly headers/footers
      if (skipWords.some(w => lower.includes(w))) continue;
      if (line.length < 3) continue;
      // Skip lines that are only numbers/symbols
      if (/^[\d\s\.\,\:\-\*\/\=\+]+$/.test(line)) continue;

      // Try to extract a price from this line or the next
      const priceMatch = line.match(/(\d+[\.,]\d{2})/g);
      let price = 0;
      if (priceMatch) {
        const prices = priceMatch.map(p => parseFloat(p.replace(",",".")));
        price = prices[prices.length - 1]; // last number is usually the price
      }

      // Extract item name — take the text part before any numbers
      let name = line.replace(/[\d\.\,\:\*\/\=\(\)]+.*$/, "").trim();
      name = name.replace(/^[\-\*\.\s]+|[\-\*\.\s]+$/g, "").trim();

      // Proper case
      name = name.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" ");

      if (name.length < 2) continue;
      if (/^\d+$/.test(name)) continue;

      // Guess unit based on name
      let unit = "piece";
      const nl = name.toLowerCase();
      if (/flour|sugar|salt|rice|chicken|beef|pork|meat|butter|powder/.test(nl)) unit = "kg";
      else if (/milk|oil|water|sauce|syrup|vinegar|coconut/.test(nl)) unit = "litre";
      else if (/egg/.test(nl)) unit = "dozen";
      else if (/box|pack|bag|tin|can|bottle/.test(nl)) unit = "pack";

      if (name.length >= 2 && price >= 0) {
        items.push({ name, price: price || 0, unit, qty: 1, confidence: price > 0 ? "high" : "low" });
      }
    }

    // Deduplicate by name
    const seen = new Set();
    return items.filter(i => { const k = i.name.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; });
  };

  const update = (id,k,v) => setScanItems(p => p.map(i => i.id===id ? {...i,[k]:v} : i));
  const toggle = (id) => setScanItems(p => p.map(i => i.id===id ? {...i,removed:!i.removed} : i));
  const activeCount = scanItems.filter(i => !i.removed).length;

  const handleSave = () => {
    onSave(scanItems.filter(i => !i.removed).map(i => ({
      id:uid(), name:i.name, price:+i.price, unit:i.unit, supplier:supplier||""
    })), supplier);
    handleClose();
  };

  if (!open) return null;
  return (
    <>
      <div className="kk-overlay" onClick={handleClose}/>
      <div className="kk-sheet">
        <div className="kk-handle"/>

        {step === "upload" && (
          <>
            <div className="kk-stitle">📷 Scan Receipt</div>
            <div className="kk-ssub">Free OCR — no internet needed after first load</div>
            <div className="scan-zone" style={{marginBottom:14}}>
              <input type="file" accept="image/*" capture="environment" onChange={handleFile}/>
              <div style={{fontSize:40,marginBottom:10}}>🧾</div>
              <div style={{fontWeight:700,fontSize:15,color:"var(--t1)",marginBottom:4}}>Tap to take photo</div>
              <div style={{fontSize:12,color:"var(--t3)"}}>or choose from camera roll</div>
            </div>
            {error && (
              <div style={{background:"rgba(244,112,112,.1)",border:"1px solid rgba(244,112,112,.3)",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,color:"var(--red)"}}>
                ⚠️ {error}
              </div>
            )}
            <div className="card" style={{marginBottom:14,padding:"12px 14px"}}>
              <div className="sec-lbl">Tips for best results</div>
              {["Good lighting, lay receipt flat","All text within frame","Avoid shadows and blur","Works best with printed thermal receipts","Review extracted items before saving"].map((t,i) => (
                <div key={i} style={{fontSize:12,color:"var(--t2)",display:"flex",gap:8,marginBottom:i<4?4:0}}>
                  <span style={{color:"var(--accent)"}}>▸</span>{t}
                </div>
              ))}
            </div>
            <button className="btn btn-g btn-full" onClick={handleClose}>Cancel</button>
          </>
        )}

        {step === "scanning" && (
          <div style={{textAlign:"center",padding:"28px 0 36px"}}>
            {preview && <img src={preview} alt="" style={{width:"100%",borderRadius:10,maxHeight:160,objectFit:"cover",marginBottom:20}}/>}
            <div className="spinner"/>
            <div style={{fontFamily:"var(--display)",fontSize:18,fontStyle:"italic",color:"var(--t1)",marginBottom:6}}>{progMsg || "Scanning..."}</div>
            <div className="prog-bar-wrap"><div className="prog-bar" style={{width:`${progress}%`}}/></div>
            <div style={{fontSize:12,color:"var(--t3)",marginTop:4}}>{progress}%</div>
          </div>
        )}

        {step === "review" && (
          <>
            <div className="kk-stitle">✅ Review Items</div>
            <div className="kk-ssub">{activeCount} item{activeCount!==1?"s":""} found · edit names & prices · tap X to remove</div>

            {preview && <img src={preview} alt="" style={{width:"100%",borderRadius:10,maxHeight:100,objectFit:"cover",marginBottom:14}}/>}

            <div style={{marginBottom:14}}>
              <F label="Supplier / Store Name">
                <input value={supplier} onChange={e=>setSupplier(e.target.value)} placeholder="e.g. NSK Trading, Mydin, etc."/>
              </F>
            </div>

            <div style={{marginBottom:12}}>
              {scanItems.map(item => (
                <div key={item.id} className={`scan-item${item.confidence==="low"?" flagged":""}${item.removed?" removed":""}`}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:item.removed?0:10}}>
                    <div style={{flex:1,marginRight:8}}>
                      {item.removed
                        ? <span style={{fontSize:13,color:"var(--t3)",textDecoration:"line-through"}}>{item.name}</span>
                        : <input value={item.name} onChange={e=>update(item.id,"name",e.target.value)}
                            style={{background:"var(--s3)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 10px",color:"var(--t1)",fontSize:14,outline:"none",width:"100%"}}/>
                      }
                    </div>
                    <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                      {item.exists && !item.removed && <span className="badge badge-amber" style={{fontSize:8,padding:"1px 6px"}}>EXISTS</span>}
                      {item.confidence==="low" && !item.removed && <span className="badge badge-amber" style={{fontSize:8,padding:"1px 6px"}}>CHECK</span>}
                      <button onClick={()=>toggle(item.id)}
                        style={{background:item.removed?"var(--s3)":"rgba(244,112,112,.1)",border:`1.5px solid ${item.removed?"var(--border)":"rgba(244,112,112,.3)"}`,borderRadius:8,padding:"5px 10px",color:item.removed?"var(--t3)":"var(--red)",fontSize:12,cursor:"pointer",fontWeight:700}}>
                        {item.removed?"Undo":"X"}
                      </button>
                    </div>
                  </div>
                  {!item.removed && (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                      <div className="sfield"><label>Price ({currency})</label><input type="number" value={item.price} onChange={e=>update(item.id,"price",e.target.value)} min={0} step="0.01"/></div>
                      <div className="sfield"><label>Qty</label><input type="number" value={item.qty} onChange={e=>update(item.id,"qty",e.target.value)} min={0} step="0.1"/></div>
                      <div className="sfield"><label>Unit</label><select value={item.unit} onChange={e=>update(item.id,"unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-p btn-full" onClick={handleSave} disabled={activeCount===0} style={{opacity:activeCount===0?.5:1}}>
                💾 Save {activeCount} Ingredient{activeCount!==1?"s":""}
              </button>
              <button className="btn btn-g" onClick={reset}>Retry</button>
            </div>
          </>
        )}
      </div>
    </>
  );
};

const IngredientsTab = ({ingredients,setIngredients,currency}) => {
  const [sheet,    setSheet]    = useState(false);
  const [scanOpen, setScanOpen] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [toast,    setToast]    = useState(null);
  const blank = {name:"",unit:"kg",purchaseQty:"1",totalPrice:"",supplier:""};
  const [form, setForm] = useState(blank);

  const open = item => {
    setEditId(item?.id||null);
    setForm(item ? {
      name:item.name, unit:item.unit,
      purchaseQty: item.purchaseQty||"1",
      totalPrice:  item.totalPrice||item.price||"",
      supplier:    item.supplier||""
    } : blank);
    setSheet(true);
  };
  const save = () => {
    if (!form.name||!form.totalPrice) return;
    const ppu = (+form.totalPrice) / (+form.purchaseQty||1);
    if (editId) { setIngredients(p=>p.map(i=>i.id===editId?{...i,...form,totalPrice:+form.totalPrice,purchaseQty:+form.purchaseQty,price:ppu}:i)); }
    else { setIngredients(p=>[...p,{id:uid(),...form,totalPrice:+form.totalPrice,purchaseQty:+form.purchaseQty,price:ppu}]); }
    setSheet(false);
  };
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),3000); };
  const handleScanSave = (items, supplier) => {
    let added=0, updated=0;
    setIngredients(prev => {
      let next = [...prev];
      items.forEach(item => {
        const idx = next.findIndex(e=>e.name.toLowerCase()===item.name.toLowerCase());
        if (idx>=0) { next[idx]={...next[idx],price:item.price,supplier:supplier||next[idx].supplier}; updated++; }
        else { next.push({id:uid(),name:item.name,price:item.price,totalPrice:item.price,purchaseQty:1,unit:item.unit,supplier:supplier||""}); added++; }
      });
      return next;
    });
    const parts = [];
    if (added) parts.push(`${added} added`);
    if (updated) parts.push(`${updated} updated`);
    showToast("✅ " + parts.join(", "));
  };

  return (
    <div className="kk-page">
      {toast && <div className="toast">{toast}</div>}
      <div className="kk-ph">
        <div className="kk-ptitle">Ingredients</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-amber btn-sm" onClick={()=>setScanOpen(true)}>📷 Scan</button>
          <button className="btn btn-p btn-sm" onClick={()=>open(null)}>+ Add</button>
        </div>
      </div>

      {ingredients.length===0 ? (
        <div>
          <Empty msg="No ingredients yet."/>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:8}}>
            <button className="btn btn-amber btn-full" style={{fontSize:15}} onClick={()=>setScanOpen(true)}>📷 Scan a Receipt (Free)</button>
            <button className="btn btn-s btn-full" onClick={()=>open(null)}>+ Add Manually</button>
          </div>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {ingredients.map(i => (
            <div key={i.id} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 14px"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:"var(--t1)"}}>{i.name}</div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>
                  {i.purchaseQty||1}{i.unit} · {i.supplier||"No supplier"}
                </div>
                <div style={{fontSize:11,color:"var(--t3)",marginTop:1}}>
                  Total: {currency}{(+(i.totalPrice||i.price||0)).toFixed(2)} →{" "}
                  <span style={{color:"var(--accent)",fontFamily:"var(--mono)",fontWeight:700}}>
                    {currency}{getPricePerUnit(i).toFixed(3)}/{i.unit}
                  </span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{display:"none"}}></div>
                <button className="btn btn-g btn-sm" onClick={()=>open(i)} style={{padding:"0 10px"}}>✎</button>
                <button className="btn btn-d btn-sm" onClick={()=>setIngredients(p=>p.filter(x=>x.id!==i.id))} style={{padding:"0 10px"}}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <Sheet open={sheet} onClose={()=>setSheet(false)} title={editId?"Edit Ingredient":"Add Ingredient"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <F label="Name"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. All-Purpose Flour"/></F>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Purchase Unit"><select value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></F>
            <F label="Qty Purchased"><input type="number" value={form.purchaseQty} onChange={e=>setForm(f=>({...f,purchaseQty:e.target.value}))} placeholder="e.g. 25" min={0} step="0.001"/></F>

          <F label={`Total Price Paid (${currency})`}>
            <input type="number" value={form.totalPrice} onChange={e=>setForm(f=>({...f,totalPrice:e.target.value}))} placeholder="e.g. 50.00" min={0} step="0.01"/>
          </F>
          {form.totalPrice>0 && form.purchaseQty>0 && (
            <div style={{background:"var(--accent-bg)",border:"1px solid var(--accent)",borderRadius:10,padding:"10px 14px",fontSize:13}}>
              <span style={{color:"var(--t3)"}}>Price per unit: </span>
              <span style={{color:"var(--accent)",fontFamily:"var(--mono)",fontWeight:700}}>
                {currency} {((+form.totalPrice)/(+form.purchaseQty)).toFixed(3)} / {form.unit}
              </span>
            </div>
          )}
          <F label="Supplier (optional)"><input value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))} placeholder="e.g. NSK Trading"/></F>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="btn btn-p btn-full" onClick={save}>{editId?"Update":"Add"}</button>
            <button className="btn btn-g" onClick={()=>setSheet(false)}>Cancel</button>

        </div>

  );

  const save = () => {
    if (!form.name||!form.sellingPrice) return;
    const data = {...form,sellingPrice:+form.sellingPrice,yield:+form.yield||1,wastage:+form.wastage,labourMin:+form.labourMin,labourRate:+form.labourRate,items:form.items.map(it=>({...it,qty:+it.qty,useUnit:it.useUnit||ingredients.find(x=>x.id===it.ingredientId)?.unit||'g'}))};
    if (editId) { setRecipes(p=>p.map(r=>r.id===editId?{...r,...data}:r)); }
    else { setRecipes(p=>[...p,{id:uid(),...data}]); }
    setSheet(false);
  };

  return (
    <div className="kk-page">
      <div className="kk-ph">
        <div className="kk-ptitle">Recipes</div>
        <button className="btn btn-p btn-sm" onClick={()=>open(null)} disabled={!ingredients.length}>+ Add</button>
      </div>
      {ingredients.length===0 && <div className="card" style={{borderColor:"var(--amber)",marginBottom:12}}><p style={{color:"var(--amber)",fontSize:13,margin:0}}>⚠️ Add ingredients first before creating recipes.</p></div>}
      {recipes.length===0 ? <Empty msg="No recipes yet. Create your first to see cost breakdown."/> : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {recipes.map(r => {
            const c = calcRecipe(r, ingredients, packaging, profile.targetCostPct);
            const isOpen = expanded === r.id;
            return (
              <div key={r.id} className="r-card">
                <div className="r-head" onClick={()=>setExpanded(isOpen?null:r.id)}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"var(--t1)"}}>{r.name}</div>
                    <div style={{display:"flex",gap:7,marginTop:4,alignItems:"center"}}>
                      <span className="badge">{r.category}</span>
                      <span style={{fontSize:10,color:"var(--t3)"}}>Yield: {r.yield}</span>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:14,alignItems:"center"}}>
                    <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:2}}>FOOD COST</div><Pill val={c.costPct} target={profile.targetCostPct}/></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:2}}>PROFIT</div><div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:13,color:c.grossProfit>=0?"var(--green)":"var(--red)"}}>{cur} {c.grossProfit.toFixed(2)}</div></div>
                    <span style={{color:"var(--t3)",fontSize:16,transform:isOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
                  </div>
                </div>
                {isOpen && (
                  <div className="r-body">
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,paddingTop:12,paddingBottom:14}}>
                      {[["Ing. Cost",`${cur} ${c.ingCost.toFixed(2)}`],["Pkg Cost",`${cur} ${c.pkgCost.toFixed(2)}`],[`Wastage ${r.wastage}%`,`${cur} ${c.wastageAmt.toFixed(2)}`],["Labour",`${cur} ${c.labourCost.toFixed(2)}`],["Total Cost",`${cur} ${c.totalCost.toFixed(2)}`],["Selling Price",`${cur} ${(+r.sellingPrice).toFixed(2)}`],["Suggested",`${cur} ${c.suggestedPrice.toFixed(2)}`],["Margin",`${c.margin.toFixed(1)}%`]].map(([l,v],i)=>(
                        <div key={i} style={{background:"var(--s2)",borderRadius:9,padding:"10px 12px"}}>
                          <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,marginBottom:3}}>{l.toUpperCase()}</div>
                          <div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:13,color:l==="Selling Price"?"var(--accent)":l==="Suggested"?"var(--amber)":l==="Margin"?(c.margin>=0?"var(--green)":"var(--red)"):"var(--t1)"}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div className="sec-lbl">Platform Margins</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                      {profile.channels.map(ch => {
                        const nr = r.sellingPrice*(1-ch.commission/100);
                        const np = nr - c.totalCost;
                        const nm = nr>0?(np/nr)*100:0;
                        return (
                          <div key={ch.id} style={{background:"var(--s2)",borderRadius:10,padding:"11px 13px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div><div style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>{ch.name}</div><div style={{fontSize:10,color:"var(--t3)"}}>{ch.commission}% commission</div></div>
                            <div style={{textAlign:"right"}}><div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:np>=0?"var(--green)":"var(--red)"}}>{cur} {np.toFixed(2)}</div><div style={{fontSize:10,color:"var(--t3)"}}>{nm.toFixed(1)}% margin</div></div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button className="btn btn-s btn-sm" style={{flex:1}} onClick={()=>open(r)}>Edit Recipe</button>
                      <button className="btn btn-d btn-sm" onClick={()=>setRecipes(p=>p.filter(x=>x.id!==r.id))}>Delete</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      <Sheet open={sheet} onClose={()=>setSheet(false)} title={editId?"Edit Recipe":"New Recipe"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
            <F label="Recipe Name"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Original Pancake"/></F>
            <F label="Category"><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></F>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <F label="Yield"><input type="number" value={form.yield} onChange={e=>setForm(f=>({...f,yield:e.target.value}))} min={1}/></F>
            <F label={`Price (${cur})`}><input type="number" value={form.sellingPrice} onChange={e=>setForm(f=>({...f,sellingPrice:e.target.value}))} min={0} step="0.1"/></F>
            <F label="Wastage %"><input type="number" value={form.wastage} onChange={e=>setForm(f=>({...f,wastage:e.target.value}))} min={0} max={50}/></F>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <F label="Labour (min)"><input type="number" value={form.labourMin} onChange={e=>setForm(f=>({...f,labourMin:e.target.value}))} min={0}/></F>
            <F label={`Rate (${cur}/hr)`}><input type="number" value={form.labourRate} onChange={e=>setForm(f=>({...f,labourRate:e.target.value}))} min={0} step="0.5"/></F>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div className="sec-lbl" style={{marginBottom:0}}>Ingredients</div>
              <button className="btn btn-s btn-sm" onClick={addItem}>+ Add</button>
            </div>
            {form.items.map((it,i)=>{
              const ing = ingredients.find(x=>x.id===it.ingredientId);
              const ppu = ing ? getPricePerUnit(ing) : 0;
              const useUnit = it.useUnit || (ing?.unit||"g");
              const qtyInBase = ing ? convertUnit(+it.qty||0, useUnit, ing.unit) : 0;
              const lineCost = ppu * qtyInBase;
              return (
                <div key={i} style={{marginBottom:10,background:"var(--s2)",borderRadius:10,padding:"10px 12px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                    <select value={it.ingredientId} onChange={e=>{const newIng=ingredients.find(x=>x.id===e.target.value);upItem(i,"ingredientId",e.target.value);if(newIng)upItem(i,"useUnit",newIng.unit);}} style={{flex:1,background:"var(--s3)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 8px",color:"var(--t1)",fontSize:13,outline:"none"}}>
                      {ingredients.map(ing=><option key={ing.id} value={ing.id}>{ing.name}</option>)}
                    </select>
                    <button onClick={()=>rmItem(i)} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:18,padding:"4px 6px",flexShrink:0}}>✕</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <div className="sfield">
                      <label>Qty Used</label>
                      <input type="number" value={it.qty} onChange={e=>upItem(i,"qty",e.target.value)} placeholder="0" min={0} step="0.001"/>
                    </div>
                    <div className="sfield">
                      <label>Unit</label>
                      <select value={useUnit} onChange={e=>upItem(i,"useUnit",e.target.value)}>
                        {UNITS.map(u=><option key={u}>{u}</option>)}
                      </select>
                    </div>
                  </div>
                  {it.qty>0 && ing && (
                    <div style={{marginTop:6,fontSize:11,color:"var(--t3)"}}>
                      {it.qty}{useUnit} → {qtyInBase.toFixed(4)}{ing.unit} ·{" "}
                      <span style={{color:"var(--accent)",fontFamily:"var(--mono)",fontWeight:700}}>{cur} {lineCost.toFixed(4)}</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {packaging.length>0 && (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div className="sec-lbl" style={{marginBottom:0}}>Packaging</div>
                <button className="btn btn-s btn-sm" onClick={addPkg}>+ Add</button>
              </div>
              {form.pkgs.map((p,i)=>(
                <div key={i} className="ing-row">
                  <select value={p.packagingId} onChange={e=>upPkg(i,"packagingId",e.target.value)} style={{flex:2}}>{packaging.map(pk=><option key={pk.id} value={pk.id}>{pk.name} ({cur}{(+pk.price).toFixed(2)})</option>)}</select>
                  <input type="number" value={p.qty} onChange={e=>upPkg(i,"qty",+e.target.value)} placeholder="Qty" min={1} style={{flex:1}}/>
                  <button onClick={()=>rmPkg(i)} style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:18,padding:"4px 6px"}}>✕</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:10,paddingTop:4}}>
            <button className="btn btn-p btn-full" onClick={save}>{editId?"Update Recipe":"Add Recipe"}</button>
            <button className="btn btn-g" onClick={()=>setSheet(false)}>Cancel</button>
          </div>
        </div>
      </Sheet>
    </div>
  );
};

// ── Dashboard ─────────────────────────────────────────────
const DashboardTab = ({recipes,ingredients,packaging,profile}) => {
  const cur = profile.currency;
  const all = useMemo(()=>recipes.map(r=>({...r,...calcRecipe(r,ingredients,packaging,profile.targetCostPct)})),[recipes,ingredients,packaging,profile.targetCostPct]);
  if (!recipes.length) return <Empty msg="Add recipes to see your dashboard analytics."/>;
  const avg     = all.reduce((s,r)=>s+r.costPct,0)/all.length;
  const top     = [...all].sort((a,b)=>b.margin-a.margin).slice(0,5);
  const bot     = [...all].sort((a,b)=>a.margin-b.margin).slice(0,5);
  const healthy = all.filter(r=>r.costPct<=profile.targetCostPct).length;
  const best    = top[0]?.margin||100;
  return (
    <div className="kk-page">
      <div className="kk-ph"><div className="kk-ptitle">Dashboard</div></div>
      <div className="stats">
        <div className="stat"><div className="slabel">Recipes</div><div className="sval">{recipes.length}</div></div>
        <div className="stat"><div className="slabel">Avg Food Cost</div><div className="sval" style={{color:avg<=profile.targetCostPct?"var(--green)":"var(--red)"}}>{avg.toFixed(1)}%</div><div className="ssub">Target: {profile.targetCostPct}%</div></div>
        <div className="stat"><div className="slabel">Healthy Items</div><div className="sval" style={{color:"var(--green)"}}>{healthy}/{recipes.length}</div><div className="ssub">Under {profile.targetCostPct}% FC</div></div>
        <div className="stat"><div className="slabel">Ingredients</div><div className="sval">{ingredients.length}</div><div className="ssub">in library</div></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontFamily:"var(--display)",fontSize:15,color:"var(--green)",marginBottom:12,fontStyle:"italic"}}>🏆 Top Margins</div>
        {top.map((r,i)=>(
          <div key={r.id} style={{marginBottom:i<top.length-1?12:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{r.name}</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)",fontSize:12}}>{r.margin.toFixed(1)}%</span>
            </div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${Math.max(0,(r.margin/best)*100)}%`,background:"var(--green)"}}/></div>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div style={{fontFamily:"var(--display)",fontSize:15,color:"var(--red)",marginBottom:12,fontStyle:"italic"}}>⚠️ Lowest Margins</div>
        {bot.map((r,i)=>(
          <div key={r.id} style={{marginBottom:i<bot.length-1?12:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{r.name}</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:700,color:r.margin<0?"var(--red)":"var(--amber)",fontSize:12}}>{r.margin.toFixed(1)}%</span>
            </div>
            <div className="prog-track"><div className="prog-fill" style={{width:`${Math.max(0,Math.min(100,(r.margin/best)*100))}%`,background:r.margin<0?"var(--red)":"var(--amber)"}}/></div>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{fontFamily:"var(--display)",fontSize:15,color:"var(--t1)",marginBottom:12,fontStyle:"italic"}}>📋 Full Menu</div>
        {[...all].sort((a,b)=>b.margin-a.margin).map(r=>(
          <div key={r.id} className="menu-card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><div style={{fontWeight:700,fontSize:13,color:"var(--t1)"}}>{r.name}</div><span className="badge" style={{marginTop:3,display:"inline-block"}}>{r.category}</span></div>
              <div style={{textAlign:"right"}}><div style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:15,color:r.grossProfit>=0?"var(--green)":"var(--red)"}}>{cur} {r.grossProfit.toFixed(2)}</div><div style={{fontSize:10,color:"var(--t3)"}}>profit/serving</div></div>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:profile.channels.length?8:0}}>
              <div><span style={{fontSize:9,color:"var(--t3)"}}>COST </span><span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--t2)"}}>{cur}{r.totalCost.toFixed(2)}</span></div>
              <div><span style={{fontSize:9,color:"var(--t3)"}}>PRICE </span><span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--t1)"}}>{cur}{(+r.sellingPrice).toFixed(2)}</span></div>
              <div><span style={{fontSize:9,color:"var(--t3)"}}>FC </span><Pill val={r.costPct} target={profile.targetCostPct}/></div>
            </div>
            {profile.channels.length>0 && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {profile.channels.map(ch=>{const net=r.sellingPrice*(1-ch.commission/100)-r.totalCost;return<div key={ch.id} style={{background:"var(--s3)",borderRadius:7,padding:"4px 10px",fontSize:11}}><span style={{color:"var(--t3)"}}>{ch.name}: </span><span style={{fontFamily:"var(--mono)",fontWeight:700,color:net>=0?"var(--green)":"var(--red)"}}>{cur}{net.toFixed(2)}</span></div>;})}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

// ── App ───────────────────────────────────────────────────
function App() {
  const saved = load();
  const [tab,         setTab]     = useState("guide");
  const [profile,     setProfile] = useState(saved?.profile     || defaultProfile);
  const [ingredients, setIngred]  = useState(saved?.ingredients || []);
  const [packaging,   setPacking] = useState(saved?.packaging   || []);
  const [recipes,     setRecipes] = useState(saved?.recipes     || []);
  const [ping,        setPing]    = useState(false);

  useEffect(() => {
    save({profile, ingredients, packaging, recipes});
    setPing(true);
    const t = setTimeout(()=>setPing(false), 1200);
    return () => clearTimeout(t);
  }, [profile, ingredients, packaging, recipes]);

  return (
    <div id="app">
      <div className="kk-bar">
        <div className="kk-logo">🍳</div>
        <div>
          <div className="kk-appname">KiraKos</div>
          <div className="kk-appsub">Food Cost Calculator</div>
        </div>
        <div className="kk-barright">
          {profile.name && <div style={{color:"var(--t2)",fontWeight:600,fontSize:11}}>{profile.name}</div>}
          <div>{profile.type} · {profile.currency} · {profile.targetCostPct}%</div>
          <div style={{fontSize:9,color:ping?"var(--green)":"var(--t3)",transition:"color .4s"}}>{ping?"✓ Saved":"Auto-save on"}</div>
        </div>
      </div>

      <div className="kk-scroll">
        {tab==="guide"       && <GuideTab setTab={setTab}/>}
        {tab==="profile"     && <ProfileTab profile={profile} setProfile={setProfile}/>}
        {tab==="ingredients" && <IngredientsTab ingredients={ingredients} setIngredients={setIngred} currency={profile.currency}/>}
        {tab==="packaging"   && <PackagingTab packaging={packaging} setPackaging={setPacking} currency={profile.currency}/>}
        {tab==="recipes"     && <RecipesTab recipes={recipes} setRecipes={setRecipes} ingredients={ingredients} packaging={packaging} profile={profile}/>}
        {tab==="dashboard"   && <DashboardTab recipes={recipes} ingredients={ingredients} packaging={packaging} profile={profile}/>}
      </div>

      <div className="kk-tabbar">
        {TABS.map(t => (
          <button key={t.key} className={`kk-tab ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}>
            <span className="ico">{t.icon}</span>
            <span className="lbl">{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
